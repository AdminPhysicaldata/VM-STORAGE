services:

  sftp:
    platform: linux/amd64
    image: atmoz/sftp:alpine
    container_name: sftp
    restart: always
    ports:
      - "2222:22"
    volumes:
      - sessions_data:/home/${SFTP_USER}/sessions
    command: "${SFTP_USER}:${SFTP_PASS}:1000:1000:sessions"
    healthcheck:
      test: ["CMD", "sh", "-c", "ss -tlnp | grep ':22'"]
      interval: 30s
      timeout: 5s
      retries: 3

  nfs:
    image: itsthenetwork/nfs-server-alpine:12
    container_name: nfs-server
    restart: always
    ports:
      - "111:111/tcp"
      - "111:111/udp"
      - "2049:2049/tcp"
      - "2049:2049/udp"
    volumes:
      - sessions_data:/nfsshare:ro
    environment:
      SHARED_DIRECTORY: /nfsshare
    privileged: true
    healthcheck:
      test: ["CMD", "sh", "-c", "ss -tlnp | grep ':2049'"]
      interval: 30s
      timeout: 5s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: cadvisor-storage
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true

volumes:
  sessions_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SESSIONS_PATH}

networks:
  default:
    name: vm-storage-network
