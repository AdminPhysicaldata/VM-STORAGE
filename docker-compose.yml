services:

  sftp:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sftp
    restart: always
    ports:
      - "2222:22"
    volumes:
      - sessions_data:/home/${SFTP_USER}/sessions
      # Sessions déjà traitées + envoyées à Mistral (déplacées par
      # mission-pipeline) — exposées en lecture/écriture en SFTP elles aussi,
      # sous un dossier séparé, pour rester consultables/récupérables côté client.
      - sessions_envoye_data:/home/${SFTP_USER}/sessions_envoyees
    command: "${SFTP_USER}:${SFTP_PASS}:1000:1000:sessions,sessions_envoyees"
    healthcheck:
      test: ["CMD", "pgrep", "sshd"]
      interval: 30s
      timeout: 5s
      retries: 3

  nfs:
    image: erichough/nfs-server:2.2.1
    container_name: nfs-server
    restart: "no"
    network_mode: host
    volumes:
      - ${SESSIONS_PATH}:/data/sessions:ro
    environment:
      NFS_EXPORT_0: '/data/sessions *(ro,sync,no_subtree_check,no_root_squash,insecure,fsid=0)'
      NFS_DISABLE_VERSION_3: '1'
    privileged: true
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep rpc.mountd >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  # sessions-uploader:
  #   build:
  #     context: ./sessions-uploader
  #     dockerfile: Dockerfile
  #   container_name: sessions-uploader
  #   restart: always
  #   volumes:
  #     - sessions_data:/data/sessions
  #     - sessions_envoye_data:/data/session_envoye
  #   environment:
  #     POSTGRES_HOST: ${VM_DATA_IP}
  #     POSTGRES_PORT: "5432"
  #     POSTGRES_DB: ${POSTGRES_DB}
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     DELIVERY_CLIENT_ID: ${DELIVERY_CLIENT_ID:-mistral}
  #     DELIVERY_CLIENT_NAME: ${DELIVERY_CLIENT_NAME:-Mistral AI}
  #     BACKEND_URL: http://${VM_BACKEND_IP}:5000
  #     INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
  #     SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
  #     SMTP_PORT: ${SMTP_PORT:-587}
  #     SMTP_USER: ${SMTP_USER}
  #     SMTP_PASS: ${SMTP_PASS}
  #     SMTP_SENDER: ${SMTP_SENDER:-${SMTP_USER}}
  #     MAX_ATTACH_MB: ${MAX_ATTACH_MB:-200}
  #     KAFKA_BROKER: ${KAFKA_BROKER:-${VM_DATA_IP}:9092}
  #     SERVER_ID: ${SERVER_ID:-vm-storage}
  #     HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-60}

  # mission-pipeline : volontairement PAS dans ce docker-compose. Le code
  # (mission-pipeline/) reste dans le repo, mais ce service tourne désormais
  # sur une machine séparée, qui se connecte ici en SFTP (service "sftp"
  # ci-dessus, port 2222, IP de cette VM) pour lire SESSIONS_DIR et écrire
  # les sessions traitées dans sessions_envoyees. Voir mission-pipeline/README
  # ou le Dockerfile pour lancer le service côté machine distante.

  fs-scanner:
    platform: linux/amd64
    build:
      context: .
      dockerfile: fs-scanner/Dockerfile
    container_name: fs-scanner
    restart: always
    volumes:
      - sessions_data:${SESSIONS_DIR:-/data/sessions}:ro
      - /mnt:/mnt:ro
    environment:
      # Identifiant unique de CETTE machine — voir fs_scanner.py. À définir
      # explicitement dans .env sur chaque serveur storage (sinon tous les
      # serveurs sans cette variable collisionnent sur "default").
      STORAGE_NODE_ID: ${STORAGE_NODE_ID:-default}
      SESSIONS_DIR: ${SESSIONS_DIR:-/data/sessions}
      BACKEND_URL: http://${VM_BACKEND_IP}:5000/api
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      SCAN_INTERVAL: ${FS_SCANNER_INTERVAL:-15}
      STABILITY_SECONDS: ${FS_SCANNER_STABILITY:-60}
      DISK_MOUNTS: ${DISK_MOUNTS:-${SESSIONS_DIR:-/data/sessions}:ssd:SSD principal:${STORAGE_NODE_ID:-default}-ssd-data}
      DISK_AUTODISCOVER_GLOB: ${DISK_AUTODISCOVER_GLOB:-/mnt/*}
      DISK_SCAN_INTERVAL: ${DISK_SCAN_INTERVAL:-300}
      # Processus/threads du scan normal (--once/--watch) — à baisser via
      # .env (FS_SCANNER_SCAN_WORKERS/FS_SCANNER_SCAN_THREADS) sur les
      # machines avec peu de RAM ou des disques USB fragiles, pour éviter
      # les OOM kill / surcharge I/O quand plusieurs gros disques sont
      # scannés en parallèle.
      SCAN_WORKERS: ${FS_SCANNER_SCAN_WORKERS:-4}
      SCAN_THREADS_PER_WORKER: ${FS_SCANNER_SCAN_THREADS:-4}
      HTTP_WORKERS: ${FS_SCANNER_HTTP_WORKERS:-8}
      SERVER_GROUP: ${FS_SCANNER_SERVER_GROUP:-MADA}
      ULTRAFAST_WORKERS: ${FS_SCANNER_ULTRAFAST_WORKERS:-}
      ULTRAFAST_THREADS_PER_WORKER: ${FS_SCANNER_ULTRAFAST_THREADS:-32}

  sync-ssd-hdd:
    platform: linux/amd64
    build:
      context: .
      dockerfile: fs-scanner/Dockerfile
    container_name: sync-ssd-hdd
    restart: always
    entrypoint: ["python", "-u", "sync_ssd_to_hdd.py"]
    command: ["--watch", "--interval", "${SYNC_INTERVAL:-300}"]
    volumes:
      - sessions_data:/data/sessions:ro
      - /mnt:/mnt
    environment:
      POSTGRES_HOST: ${VM_DATA_IP}
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SYNC_WORKERS: ${SYNC_WORKERS:-2}
      MIN_FREE_BYTES: ${MIN_FREE_BYTES:-10737418240}

  post-pipeline:
    platform: linux/amd64
    build:
      context: .
      dockerfile: post/Dockerfile
    container_name: post-pipeline
    restart: always
    volumes:
      # PAS de :ro ici : ce service renomme des fichiers, écrit le cache
      # .postcheck.json et déplace les sessions en anomalie vers la quarantaine.
      - sessions_data:/data/sessions
      - sessions_quarantine_data:/data/sessions_quarantine
      - post_reports_data:/data/reports
    environment:
      TZ: ${POST_PIPELINE_TZ:-UTC}
      SESSIONS_DIR: /data/sessions
      QUARANTINE_DIR: /data/sessions_quarantine
      REPORTS_DIR: /data/reports
      RUN_AT: ${POST_PIPELINE_RUN_AT:-03:00}
      WORKERS: ${POST_PIPELINE_WORKERS:-4}
      APPLY: ${POST_PIPELINE_APPLY:-0}
      KEEP_REPORTS: ${POST_PIPELINE_KEEP_REPORTS:-30}

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: cadvisor-storage
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true

volumes:
  sessions_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SESSIONS_PATH}
  sessions_envoye_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SESSIONS_ENVOYE_PATH}
  sessions_quarantine_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SESSIONS_QUARANTINE_PATH}
  post_reports_data:
    driver: local

networks:
  default:
    name: vm-storage-network
